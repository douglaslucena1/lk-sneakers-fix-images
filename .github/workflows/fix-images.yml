name: Fix Missing Images (LK Sneakers blog)

# Triggers:
#  - workflow_dispatch: rodar manualmente (com input pra chunk size)
#  - schedule: a cada 6h (4 runs/dia, ~150-200 posts/dia, ~3000 em ~15-20 dias)
on:
  workflow_dispatch:
    inputs:
      chunk_size:
        description: "Quantos posts processar nesse run (max ~150 cabe em 6h)"
        required: false
        default: "100"
      dry_run:
        description: "Dry-run (não atualiza posts; só baixa imagens e simula)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # A cada 3 horas (8 runs/dia × 100 posts = 800/dia → ~4 dias pros 3000)
    - cron: "0 */3 * * *"

# Garante que apenas 1 run por vez (evita conflitos de concurrent updates no WP)
concurrency:
  group: fix-images
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h50min (limite GHA é 6h)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install Playwright browsers (chromium + patchright)
        # Scrapling usa patchright (Chromium "patcheado") via StealthyFetcher
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          python -m playwright install chromium --with-deps
          python -m patchright install chromium

      - name: Run scrape.py (descobre posts e baixa imagens)
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          CHUNK_SIZE: ${{ github.event.inputs.chunk_size || '50' }}
        run: |
          python scrape.py --max-posts $CHUNK_SIZE --output scraped.json

      - name: Run fix_missing_images.py (upload + update)
        if: github.event.inputs.dry_run != 'true'
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python fix_missing_images.py --scraped-json scraped.json

      - name: Run fix_missing_images.py DRY-RUN
        if: github.event.inputs.dry_run == 'true'
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python fix_missing_images.py --scraped-json scraped.json --dry-run

      - name: Upload reports + logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Run summary" >> $GITHUB_STEP_SUMMARY
          shopt -s nullglob
          csvs=(reports/*.csv)
          if [ ${#csvs[@]} -eq 0 ]; then
            echo "_Nenhum relatorio gerado nesse run._" >> $GITHUB_STEP_SUMMARY
          else
            for f in "${csvs[@]}"; do
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            done
          fi
